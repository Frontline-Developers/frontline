name: Build

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set Gradle JDK path
        run: echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Inject firebase_options.dart
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS }}
        run: |
          echo "$FIREBASE_OPTIONS" | base64 -d > lib/firebase_options.dart

      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          python3 << 'EOF'
          import base64, os, json
          encoded = os.environ.get('GOOGLE_SERVICES_JSON', '').strip()
          if not encoded:
            print("ERROR: GOOGLE_SERVICES_JSON secret is not set or empty")
            exit(1)
          try:
            decoded = base64.b64decode(encoded)
            json.loads(decoded)
          except (ValueError, json.JSONDecodeError) as e:
            print(f"ERROR: Invalid base64 or JSON: {e}")
            exit(1)
          with open('android/app/google-services.json', 'wb') as f:
            f.write(decoded)
          print("google-services.json injected successfully")
          EOF

      - run: flutter pub get

      - run: dart run build_runner build

      - run: |
          flutter build apk --debug \
            --dart-define=USE_EMULATOR=false \
            --dart-define=MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}

  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Inject firebase_options.dart
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS }}
        run: |
          echo "$FIREBASE_OPTIONS" | base64 -d > lib/firebase_options.dart

      - run: flutter pub get

      - run: dart run build_runner build

      - run: |
          flutter build web \
            --dart-define=USE_EMULATOR=false \
            --dart-define=MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}
